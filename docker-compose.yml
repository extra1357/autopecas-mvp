version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autopecas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autopecas
      POSTGRES_PASSWORD: autopecas123
      POSTGRES_DB: autopecas_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: autopecas_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:host.docker.internal:6379
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
